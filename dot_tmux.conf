# vi mode
set-window-option -g mode-keys vi
set-option -g status-keys vi
set-option -g history-limit 20000
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# misc settings
set -g default-terminal "screen-256color"

# set prefix key to `
unbind C-b
set -g prefix `
# send the prefix to client inside window (ala nested sessions)
bind-key ` send-prefix

# statusbar
set -g status-bg '#008700'
set -g status-fg black
set -g status-right-length 50
set -g status-right '#(uptime | rev | cut -d":" -f1 | rev | sed s/,//g ) #[bold,bg=black,fg=#008700]#[fg=green]#H#[fg=#008700]#[nobold,bg=#008700,fg=black] %d.%m.%Y %H:%M'
set-window-option -g window-status-current-style bg=black,fg=green,bold

set -sg escape-time 0
set -g -a terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

version_pat='s/^tmux[^0-9]*([.0-9]+).*/\1/p'

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n M-h if-shell "$is_vim" "send-keys M-h" "select-pane -L"
bind-key -n M-j if-shell "$is_vim" "send-keys M-j" "select-pane -D"
bind-key -n M-k if-shell "$is_vim" "send-keys M-k" "select-pane -U"
bind-key -n M-l if-shell "$is_vim" "send-keys M-l" "select-pane -R"
tmux_version="$(tmux -V | sed -En "$version_pat")"
setenv -g tmux_version "$tmux_version"

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'M-\\' if-shell \"$is_vim\" 'send-keys M-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi M-h select-pane -L
bind-key -T copy-mode-vi M-j select-pane -D
bind-key -T copy-mode-vi M-k select-pane -U
bind-key -T copy-mode-vi M-l select-pane -R
bind-key -T copy-mode-vi M-\\ select-pane -l

run-shell /home/shdb/dev/tmux-cluster/tmc.tmux
